<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🎵 MusicGrow - 音楽教室 成長記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a1e;font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;color:#e8e8f0;min-height:100vh;}
input,select,textarea,button{font-family:inherit;}
.header{padding:14px 20px;border-bottom:1px solid #181832;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(10,10,30,0.96);backdrop-filter:blur(8px);z-index:10;}
.logo{font-size:17px;font-weight:800;color:#e8e8f0;}
.logo-sub{font-size:10px;color:#444;}
.tab-bar{display:flex;gap:6px;}
.tab-btn{background:#111126;border:1px solid #1e1e38;border-radius:8px;padding:5px 11px;color:#a0a0c0;font-size:12px;cursor:pointer;}
.tab-btn.active{background:#181832;border-color:#6ee7b7;color:#6ee7b7;font-weight:700;}
.content{padding:20px 20px 60px;max-width:480px;margin:0 auto;}
.card{background:#111126;border:1px solid #1e1e38;border-radius:14px;padding:16px;margin-bottom:12px;}
.card-label{color:#a0a0c0;font-size:12px;margin-bottom:10px;}
.section-title{font-size:18px;font-weight:700;color:#e8e8f0;margin-bottom:16px;}
.inp{width:100%;background:#0a0a1e;border:1px solid #252540;border-radius:8px;padding:8px 10px;color:#e8e8f0;font-size:14px;outline:none;}
.inp::placeholder{color:#444;}
textarea.inp{height:60px;resize:none;}
.btn{background:#6ee7b7;color:#0a0a1e;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:10px;}
.btn-red{background:#f87171;}
.back-btn{background:none;border:none;color:#6ee7b7;font-size:14px;cursor:pointer;padding:0 0 14px 0;}
.chip-btn{background:#0a0a1e;border:1px solid #252540;border-radius:6px;padding:4px 10px;color:#a0a0c0;font-size:12px;cursor:pointer;}
.chip-btn.active{background:#6ee7b7;color:#0a0a1e;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.stars span{font-size:22px;cursor:pointer;color:#2e2e42;user-select:none;}
.stars span.on{color:#f4b942;}
.stars-sm span{font-size:14px;}
.stat-bar{display:flex;gap:8px;margin-bottom:18px;}
.stat-box{flex:1;background:#111126;border:1px solid #1e1e38;border-radius:12px;padding:10px 6px;text-align:center;}
.stat-val{font-size:17px;font-weight:800;color:#6ee7b7;}
.stat-lbl{font-size:10px;color:#555;margin-top:2px;}
.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap;}
.mood-bar{display:flex;gap:12px;justify-content:center;}
.mood-bar span{font-size:28px;cursor:pointer;opacity:0.25;transition:opacity .15s;}
.mood-bar span.on{opacity:1;}
.calendar{display:flex;flex-wrap:wrap;gap:4px;}
.cal-day{width:22px;height:22px;border-radius:4px;background:#161628;border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#0d0d1e;font-weight:700;}
.cal-day.done{background:#6ee7b7;}
.student-item{cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.arrow{color:#6ee7b7;font-size:22px;}
.green{color:#6ee7b7;}
.muted{color:#a0a0c0;}
.small{font-size:12px;}
.smaller{font-size:11px;color:#777;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0;}
.hw-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.done-text{text-decoration:line-through;color:#555;}
.mini-btn{background:#6ee7b7;border:none;border-radius:6px;padding:4px 10px;color:#0a0a1e;font-size:12px;cursor:pointer;white-space:nowrap;}
.mini-btn.undo{background:#1e1e32;color:#555;}
/* Metronome */
.beats{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.beat-dot{width:22px;height:22px;border-radius:50%;background:#1e1e32;transition:background .05s;}
.beat-dot.first{border:2px solid #f4b942;}
.beat-dot.other{border:2px solid #2a2a4a;}
.beat-dot.active-first{background:#f4b942;}
.beat-dot.active-other{background:#6ee7b7;}
.bpm-num{font-size:52px;font-weight:800;color:#e8e8f0;text-align:center;line-height:1;}
.bpm-lbl{color:#555;font-size:12px;text-align:center;margin-bottom:14px;}
input[type=range]{width:100%;accent-color:#6ee7b7;margin-bottom:14px;}
/* SVG charts */
svg text{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">🎵 MusicGrow</div><div class="logo-sub">音楽教室 成長記録 — デモ版</div></div>

    <button class="tab-btn active" onclick="switchMode('teacher')">🎓 先生</button>

</div>
<div class="content" id="app"></div>

<script>
// ============================================================
// Data
// ============================================================
const SK = 'musicgrow-v1';
function load(){try{const d=localStorage.getItem(SK);return d?JSON.parse(d):null;}catch{return null;}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

const TEMPLATES={
  ピアノ:[{k:'pitch',l:'音程'},{k:'rhythm',l:'リズム'},{k:'sight',l:'読譜'},{k:'expression',l:'表現'},{k:'posture',l:'姿勢'}],
  バイオリン:[{k:'pitch',l:'音程'},{k:'bowing',l:'ボウイング'},{k:'tone',l:'音色'},{k:'posture',l:'姿勢'},{k:'expression',l:'表現'}],
  管楽器:[{k:'pitch',l:'音程'},{k:'tonguing',l:'タンギング'},{k:'tone',l:'音色'},{k:'breath',l:'呼吸'},{k:'expression',l:'表現'}],
  ボーカル:[{k:'pitch',l:'音程'},{k:'rhythm',l:'リズム'},{k:'voice',l:'発声'},{k:'diction',l:'発音'},{k:'expression',l:'表現'}],
  ギター:[{k:'pitch',l:'音程'},{k:'rhythm',l:'リズム'},{k:'tone',l:'音色'},{k:'posture',l:'姿勢'},{k:'expression',l:'表現'}],
  チェロ:[{k:'pitch',l:'音程'},{k:'bowing',l:'ボウイング'},{k:'tone',l:'音色'},{k:'posture',l:'姿勢'},{k:'expression',l:'表現'}],
  フルート:[{k:'pitch',l:'音程'},{k:'tone',l:'音色'},{k:'breath',l:'呼吸'},{k:'posture',l:'姿勢'},{k:'expression',l:'表現'}],
  その他:[{k:'rhythm',l:'リズム'},{k:'tone',l:'音色'},{k:'expression',l:'表現'},{k:'posture',l:'姿勢'},{k:'attitude',l:'取り組み'}],
};
const VIDEO_ITEMS=[{k:'overall',l:'総合'},{k:'technique',l:'テクニック'},{k:'musicality',l:'音楽性'},{k:'presence',l:'存在感'}];
const MOODS=['😫','😕','😐','🙂','😄'];
const INSTRUMENTS=Object.keys(TEMPLATES);

let DB = load() || {
  students:[
    {id:'s1',name:'田中さくら',instrument:'ピアノ',since:'2023-04'},
    {id:'s2',name:'鈴木ひろと',instrument:'バイオリン',since:'2023-09'},
  ],
  lessons:[
    {id:'l1',sid:'s1',date:'2025-01-10',song:'ソナタ Op.13',scores:{pitch:4,rhythm:4,sight:3,expression:3,posture:5},comment:'リズムが安定してきました。表現力をさらに意識して。'},
    {id:'l2',sid:'s1',date:'2025-02-07',song:'ソナタ Op.13',scores:{pitch:4,rhythm:4,sight:4,expression:4,posture:5},comment:'表現力が上がりました！次回は強弱を意識しましょう。'},
    {id:'l3',sid:'s1',date:'2025-03-14',song:'革命のエチュード',scores:{pitch:4,rhythm:3,sight:4,expression:4,posture:4},comment:'新曲に挑戦！テンポキープが今後の課題です。'},
    {id:'l4',sid:'s2',date:'2025-01-15',song:'バッハ ドッペルコンチェルト',scores:{pitch:3,bowing:3,tone:3,posture:4,expression:2},comment:'基礎が固まってきた。音色の豊かさを意識して。'},
    {id:'l5',sid:'s2',date:'2025-02-19',song:'バッハ ドッペルコンチェルト',scores:{pitch:4,bowing:4,tone:4,posture:4,expression:3},comment:'音色が改善。表現の幅を広げていきましょう。'},
  ],
  videos:[
    {id:'v1',sid:'s1',month:'2025-01',song:'ソナタ Op.13',scores:{overall:4,technique:3,musicality:4,presence:3},comment:'全体的にまとまってきた。さらなる深みに期待！'},
    {id:'v2',sid:'s1',month:'2025-02',song:'ソナタ Op.13',scores:{overall:4,technique:4,musicality:4,presence:4},comment:'素晴らしい成長！本番でもこの調子で。'},
    {id:'v3',sid:'s2',month:'2025-01',song:'バッハ',scores:{overall:3,technique:3,musicality:3,presence:3},comment:'着実に進歩しています。'},
  ],
  practices:[
    {id:'p1',sid:'s1',date:'2025-03-25',minutes:30,content:'革命のエチュード 右手練習',mood:3,note:'だいぶ慣れてきた'},
    {id:'p2',sid:'s1',date:'2025-03-26',minutes:45,content:'革命のエチュード 両手合わせ',mood:4,note:''},
    {id:'p3',sid:'s1',date:'2025-03-28',minutes:20,content:'ハノン + ソナタ復習',mood:2,note:'疲れてたけど頑張った'},
    {id:'p4',sid:'s2',date:'2025-03-27',minutes:30,content:'ドッペルコンチェルト 1楽章',mood:3,note:''},
  ],

    {id:'h1',sid:'s1',setDate:'2025-03-14',dueDate:'2025-04-11',task:'右手だけでテンポ60まで弾けるようにする',done:false},
    {id:'h2',sid:'s1',setDate:'2025-03-14',dueDate:'2025-04-11',task:'8小節を止まらず通す',done:false},

// ============================================================
// State
// ============================================================
let mode='teacher';
let tView='list'; // teacher: list | detail
let sView='home'; // student: home | dash | tab
let selStudent=null;
let sTab='home';
let tTab='lesson';
// Forms
let lf={date:today(),song:'',scores:{},comment:''};
let vf={month:todayMonth(),song:'',scores:{overall:3,technique:3,musicality:3,presence:3},comment:''};
let hw={task:'',dueDate:''};
let pf={date:today(),minutes:30,content:'',mood:3,note:''};
let newName='',newInst='ピアノ';
// Metronome
let metro={bpm:80,playing:false,beat:0,bpb:4,interval:null,ctx:null};

function today(){return new Date().toISOString().slice(0,10);}
function todayMonth(){return new Date().toISOString().slice(0,7);}
function uid(){return Date.now().toString(36);}
function avg(scores){const v=Object.values(scores).filter(x=>typeof x==='number');return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function getStreak(sid){
  const dates=[...new Set(DB.practices.filter(p=>p.sid===sid).map(p=>p.date))].sort().reverse();
  if(!dates.length)return 0;
  let streak=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const d of dates){const pd=new Date(d);const diff=Math.round((cur-pd)/86400000);if(diff<=1){streak++;cur=pd;}else break;}
  return streak;
}
function getTotalMin(sid){return DB.practices.filter(p=>p.sid===sid).reduce((a,p)=>a+p.minutes,0);}
function tmpl(inst){return TEMPLATES[inst]||TEMPLATES['その他'];}
function initScores(inst){return tmpl(inst).reduce((a,it)=>({...a,[it.k]:3}),{});}

// ============================================================
// Render
// ============================================================
function r(){
  const app=document.getElementById('app');
  if(mode==='teacher'){
    if(tView==='list') app.innerHTML=renderTeacherList();
    else app.innerHTML=renderTeacherDetail();
  } else {
    if(sView==='home') app.innerHTML=renderStudentHome();
    else app.innerHTML=renderStudentDash();
  }
}

// ---- Helpers ----
function stars(val,cb,sm){
  let h=`<span class="stars${sm?' stars-sm':''}">`;
  for(let i=1;i<=5;i++) h+=`<span class="${val>=i?'on':''}" ${cb?`onclick="${cb}(${i})"`:''}">★</span>`;
  return h+'</span>';
}

function radarSVG(scores,items,size){
  size=size||180;
  const n=items.length,cx=size/2,cy=size/2,rr=size*0.35;
  const angle=i=>Math.PI*2*i/n-Math.PI/2;
  const pt=(i,v)=>({x:cx+rr*(v/5)*Math.cos(angle(i)),y:cy+rr*(v/5)*Math.sin(angle(i))});
  let h=`<svg width="${size}" height="${size}">`;
  for(let lv=1;lv<=5;lv++){
    const pts=items.map((_,i)=>{const p=pt(i,lv);return `${p.x},${p.y}`;}).join(' ');
    h+=`<polygon points="${pts}" fill="none" stroke="#252538" stroke-width="1"/>`;
  }
  items.forEach((_,i)=>{const p=pt(i,5);h+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#252538" stroke-width="1"/>`;});
  const dpts=items.map((it,i)=>{const p=pt(i,scores[it.k]||0);return `${p.x},${p.y}`;}).join(' ');
  h+=`<polygon points="${dpts}" fill="#6ee7b7" fill-opacity="0.28" stroke="#6ee7b7" stroke-width="2"/>`;
  items.forEach((it,i)=>{const lp=pt(i,6.3);h+=`<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" style="font-size:10px;fill:#8888aa">${it.l}</text>`;});
  return h+'</svg>';
}

function lineSVG(data,labels){
  if(data.length<2)return '<div style="color:#444;font-size:12px;padding:8px 0">レッスンが2回以上になると表示されます</div>';
  const w=270,h=80,pad=14;
  const xStep=(w-pad*2)/(data.length-1);
  const yScale=v=>pad+((5-v)/5)*(h-pad*2);
  let h2=`<svg width="${w}" height="${h}" style="overflow:visible">`;
  for(let lv=1;lv<=5;lv++) h2+=`<line x1="${pad}" y1="${yScale(lv)}" x2="${w-pad}" y2="${yScale(lv)}" stroke="#1e1e32" stroke-width="1"/>`;
  const pts=data.map((v,i)=>`${pad+i*xStep},${yScale(v)}`).join(' ');
  h2+=`<polyline points="${pts}" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linejoin="round"/>`;
  data.forEach((v,i)=>h2+=`<circle cx="${pad+i*xStep}" cy="${yScale(v)}" r="4" fill="#6ee7b7"/>`);
  if(labels) data.forEach((_,i)=>h2+=`<text x="${pad+i*xStep}" y="${h+10}" text-anchor="middle" style="font-size:9px;fill:#555">${labels[i]}</text>`);
  return h2+'</svg>';
}

function calendarHTML(sid){
  const days=[];const today2=new Date();today2.setHours(0,0,0,0);
  for(let i=29;i>=0;i--){const d=new Date(today2);d.setDate(today2.getDate()-i);days.push(d.toISOString().slice(0,10));}
  const practiced=new Set(DB.practices.filter(p=>p.sid===sid).map(p=>p.date));
  return '<div class="calendar">'+days.map(d=>`<div class="cal-day${practiced.has(d)?' done':''}" title="${d}">${practiced.has(d)?'✓':''}</div>`).join('')+'</div>';
}

// ---- Teacher ----
function renderTeacherList(){
  let h=`<h2 class="section-title">生徒一覧</h2>`;
  DB.students.forEach(s=>{
    h+=`<div class="card" onclick="selectStudent('${s.id}')"><div class="student-item"><div><div style="font-weight:700;font-size:16px">${s.name}</div><div class="small green">${s.instrument} · ${s.since}〜</div></div><span class="arrow">›</span></div></div>`;
  });
  h+=`<div class="card" style="border-color:#1a1a3a;margin-top:8px">
    <div class="card-label">＋ 生徒を追加</div>
    <input class="inp" placeholder="名前" id="newName" value="${newName}" oninput="newName=this.value">
    <select class="inp" style="margin-top:8px" id="newInst" onchange="newInst=this.value">
      ${INSTRUMENTS.map(v=>`<option${v===newInst?' selected':''}>${v}</option>`).join('')}
    </select>
    <button class="btn" onclick="addStudent()">追加</button>
  </div>`;
  return h;
}

function renderTeacherDetail(){

  const items=tmpl(s.instrument);
  let h=`<button class="back-btn" onclick="tView='list';r()">← 戻る</button>

  <div class="tabs">
    <button class="tab-btn${tTab==='lesson'?' active':''}" onclick="tTab='lesson';r()">📝 レッスン</button>
    <button class="tab-btn${tTab==='video'?' active':''}" onclick="tTab='video';r()">🎬 動画評価</button>
    <button class="tab-btn${tTab==='homework'?' active':''}" onclick="tTab='homework';r()">📌 課題</button>
  </div>`;

  if(tTab==='lesson'){
    h+=`<div class="card">
      <div class="card-label">新しいレッスンを記録</div>
      <input type="date" class="inp" value="${lf.date}" onchange="lf.date=this.value">
      <input class="inp" style="margin-top:8px" placeholder="曲名" value="${lf.song}" oninput="lf.song=this.value">
      <div style="margin-top:12px">`;
    items.forEach(it=>{
      if(!lf.scores[it.k]) lf.scores[it.k]=3;
      h+=`<div class="row"><span class="muted small" style="width:80px">${it.l}</span>${stars(lf.scores[it.k],`setLScore_${it.k}`)}</div>`;
    });
    h+=`</div><textarea class="inp" style="margin-top:8px" placeholder="コメント（任意）" oninput="lf.comment=this.value">${lf.comment}</textarea>
      <button class="btn" onclick="addLesson()">記録する</button>
    </div>`;
    const myLessons=[...DB.lessons.filter(l=>l.sid===s.id)].sort((a,b)=>b.date.localeCompare(a.date));
    myLessons.forEach(l=>{
      h+=`<div class="card"><div class="row"><span class="small green">${l.date}</span><span style="font-weight:600">${l.song}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">`;
      items.forEach(it=>h+=`<div class="smaller">${it.l} ${stars(l.scores[it.k]||0,null,true)}</div>`);
      h+=`</div>${l.comment?`<div style="margin-top:6px;color:#c0c0d8;font-size:12px">💬 ${l.comment}</div>`:''}</div>`;
    });
  }

  if(tTab==='video'){
    h+=`<div class="card">
      <div class="card-label">月次動画評価を記録</div>
      <input type="month" class="inp" value="${vf.month}" onchange="vf.month=this.value">
      <input class="inp" style="margin-top:8px" placeholder="曲名" value="${vf.song}" oninput="vf.song=this.value">
      <div style="margin-top:10px">`;
    VIDEO_ITEMS.forEach(it=>{
      h+=`<div class="row"><span class="muted small" style="width:80px">${it.l}</span>${stars(vf.scores[it.k]||3,`setVScore_${it.k}`)}</div>`;
    });
    h+=`</div><textarea class="inp" style="margin-top:8px" placeholder="コメント" oninput="vf.comment=this.value">${vf.comment}</textarea>
      <button class="btn" onclick="addVideo()">記録する</button>
    </div>`;
    const myVideos=[...DB.videos.filter(v=>v.sid===s.id)].sort((a,b)=>b.month.localeCompare(a.month));
    myVideos.forEach(v=>{
      h+=`<div class="card"><div class="row"><span class="small green">${v.month}</span><span style="font-weight:600">${v.song}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">`;
      VIDEO_ITEMS.forEach(it=>h+=`<div class="smaller">${it.l} ${stars(v.scores[it.k],null,true)}</div>`);
      h+=`</div>${v.comment?`<div style="margin-top:6px;color:#c0c0d8;font-size:12px">💬 ${v.comment}</div>`:''}</div>`;
    });
  }

  if(tTab==='homework'){
    h+=`<div class="card">
      <div class="card-label">課題を追加</div>
      <textarea class="inp" style="height:64px" placeholder="課題内容（例：右手だけでテンポ60まで）" oninput="hw.task=this.value">${hw.task}</textarea>
      <div class="muted small" style="margin:8px 0 4px">次回レッスン日</div>
      <input type="date" class="inp" value="${hw.dueDate}" onchange="hw.dueDate=this.value">
      <button class="btn" onclick="addHomework()">課題を設定</button>
    </div>`;
    DB.homeworks.filter(h2=>h2.sid===s.id).forEach(hw2=>{
      h+=`<div class="card" style="opacity:${hw2.done?0.5:1}"><div class="hw-row">
        <div style="flex:1"><div class="${hw2.done?'done-text':''}" style="font-size:14px">${hw2.task}</div>
        ${hw2.dueDate?`<div class="small green" style="margin-top:4px">期限: ${hw2.dueDate}</div>`:''}</div>
        <button class="mini-btn${hw2.done?' undo':''}" onclick="toggleHw('${hw2.id}')">${hw2.done?'取り消し':'達成！'}</button>
      </div></div>`;
    });
  }
  return h;
}

// ---- Student ----
function renderStudentHome(){

  DB.students.forEach(s=>{
    h+=`<div class="card" onclick="selStudent=DB.students.find(x=>x.id==='${s.id}');sView='dash';sTab='home';r()">
      <div class="student-item"><div><div style="font-weight:700;font-size:18px">${s.name}</div><div class="small green">${s.instrument} · ${s.since}〜</div></div><span class="arrow">›</span></div>
    </div>`;
  });
  return h;
}

function renderStudentDash(){
  const s=selStudent;
  const streak=getStreak(s.id);
  const totalMin=getTotalMin(s.id);
  const items=tmpl(s.instrument);
  const myLessons=[...DB.lessons.filter(l=>l.sid===s.id)].sort((a,b)=>a.date.localeCompare(b.date));
  const myVideos=[...DB.videos.filter(v=>v.sid===s.id)].sort((a,b)=>a.month.localeCompare(b.month));
  const myPractices=[...DB.practices.filter(p=>p.sid===s.id)].sort((a,b)=>a.date.localeCompare(b.date));
  const myHw=DB.homeworks.filter(h=>h.sid===s.id&&!h.done);
  const latest=myLessons[myLessons.length-1];
  const trendData=myLessons.map(l=>avg(l.scores));
  const trendLabels=myLessons.map(l=>l.date.slice(5));
  const avgScores=myLessons.length>0?items.reduce((acc,it)=>({...acc,[it.k]:myLessons.map(l=>l.scores[it.k]||0).reduce((a,b)=>a+b,0)/myLessons.length}),{}):items.reduce((a,it)=>({...a,[it.k]:0}),{});

  let h=`<button class="back-btn" onclick="sView='home';r()">← 戻る</button>
  <div style="margin-bottom:14px"><div style="font-size:22px;font-weight:800">${s.name}</div><div class="small green">${s.instrument} · ${s.since}〜</div></div>
  <div class="stat-bar">
    <div class="stat-box"><div class="stat-val">${streak}日</div><div class="stat-lbl">🔥 連続練習</div></div>
    <div class="stat-box"><div class="stat-val">${Math.floor(totalMin/60)}h${totalMin%60}m</div><div class="stat-lbl">⏱ 累計時間</div></div>
    <div class="stat-box"><div class="stat-val">${myLessons.length}回</div><div class="stat-lbl">📝 レッスン</div></div>
  </div>
  <div class="tabs">
    <button class="tab-btn${sTab==='home'?' active':''}" onclick="sTab='home';r()" style="font-size:11px;padding:5px 8px">🏠 ホーム</button>
    <button class="tab-btn${sTab==='practice'?' active':''}" onclick="sTab='practice';r()" style="font-size:11px;padding:5px 8px">✏️ 練習</button>
    <button class="tab-btn${sTab==='growth'?' active':''}" onclick="sTab='growth';r()" style="font-size:11px;padding:5px 8px">📊 成長</button>
    <button class="tab-btn${sTab==='homework'?' active':''}" onclick="sTab='homework';r()" style="font-size:11px;padding:5px 8px">📌 課題</button>
    <button class="tab-btn${sTab==='video'?' active':''}" onclick="sTab='video';r()" style="font-size:11px;padding:5px 8px">🎬 動画</button>
    <button class="tab-btn${sTab==='metro'?' active':''}" onclick="sTab='metro';r()" style="font-size:11px;padding:5px 8px">🎵 テンポ</button>
  </div>`;

  if(sTab==='home'){
    if(myHw.length) h+=`<div class="card" style="border-color:#2a1a5a">${myHw.map(hw2=>`<div class="card-label">📌 今の課題</div><div style="font-size:14px;margin-bottom:4px">• ${hw2.task}</div>`).join('')}</div>`;
    if(latest) h+=`<div class="card"><div class="card-label">🎵 直近レッスン（${latest.date}）</div>
      <div style="font-weight:700;margin-bottom:8px">${latest.song}</div>
      ${items.map(it=>`<div class="row" style="margin-bottom:4px"><span class="muted small" style="width:70px">${it.l}</span>${stars(latest.scores[it.k]||0,null,true)}</div>`).join('')}
      ${latest.comment?`<div style="margin-top:8px;color:#c0c0d8;font-size:12px;font-style:italic">💬 ${latest.comment}</div>`:''}
    </div>`;
    h+=`<div class="card"><div class="card-label">📈 スコアの推移</div>${lineSVG(trendData,trendLabels)}</div>`;
  }

  if(sTab==='practice'){
    h+=`<div class="card">
      <div class="card-label">今日の練習を記録</div>
      <input type="date" class="inp" value="${pf.date}" onchange="pf.date=this.value">
      <div style="margin:12px 0 4px"><div class="muted small" style="margin-bottom:6px">練習時間</div>
      <div class="chips">${[10,15,20,30,45,60,90].map(m=>`<button class="chip-btn${pf.minutes===m?' active':''}" onclick="pf.minutes=${m};r()">${m}分</button>`).join('')}</div></div>
      <input class="inp" style="margin-top:6px" placeholder="練習内容（例：ソナタ 1楽章 右手）" value="${pf.content}" oninput="pf.content=this.value">
      <div style="margin-top:12px"><div class="muted small" style="margin-bottom:8px">今日の調子</div>
      <div class="mood-bar">${MOODS.map((m,i)=>`<span class="${pf.mood===i?'on':''}" onclick="pf.mood=${i};r()">${m}</span>`).join('')}</div></div>
      <textarea class="inp" style="margin-top:10px;height:52px" placeholder="メモ（任意）" oninput="pf.note=this.value">${pf.note}</textarea>
      <button class="btn" onclick="addPractice()">記録する</button>
    </div>`;
    [...myPractices].reverse().forEach(p=>{
      h+=`<div class="card"><div class="row"><span class="small green">${p.date}</span><span style="font-size:18px">${MOODS[p.mood]}</span></div>
      <div style="font-weight:600;font-size:14px;margin-top:4px">${p.content}</div>
      <div class="smaller" style="margin-top:2px">⏱ ${p.minutes}分</div>
      ${p.note?`<div style="color:#c0c0d8;font-size:12px;margin-top:4px">📝 ${p.note}</div>`:''}</div>`;
    });
  }

  if(sTab==='growth'){
    h+=`<div class="card"><div class="card-label">📊 スキルのバランス（平均）</div><div style="display:flex;justify-content:center">${radarSVG(avgScores,items,200)}</div></div>`;
    h+=`<div class="card"><div class="card-label">📈 総合スコアの推移</div>${lineSVG(trendData,trendLabels)}</div>`;
    h+=`<div class="card"><div class="card-label">🗓 練習カレンダー（直近30日）</div>${calendarHTML(s.id)}</div>`;
  }

  if(sTab==='homework'){
    h+='<div class="card-label">先生からの課題</div>';
    const allHw=DB.homeworks.filter(h2=>h2.sid===s.id);
    if(!allHw.length) h+='<div style="color:#555;font-size:13px">課題がまだありません。</div>';
    allHw.forEach(hw2=>{
      h+=`<div class="card" style="opacity:${hw2.done?0.45:1}"><div class="hw-row">
        <div style="flex:1"><div class="${hw2.done?'done-text':''}" style="font-size:14px">${hw2.task}</div>
        ${hw2.dueDate?`<div class="small green" style="margin-top:4px">期限: ${hw2.dueDate}</div>`:''}</div>
        <div style="font-size:22px;margin-left:8px">${hw2.done?'✅':'🎯'}</div>
      </div></div>`;
    });
  }

  if(sTab==='video'){
    if(!myVideos.length) h+='<div style="color:#555;font-size:13px">動画評価がまだありません。</div>';
    [...myVideos].reverse().forEach(v=>{
      h+=`<div class="card"><div class="row"><span class="small green">${v.month}</span><span style="font-weight:600">${v.song}</span></div>
      <div style="display:flex;justify-content:center;margin-top:8px">${radarSVG(v.scores,VIDEO_ITEMS,160)}</div>
      ${v.comment?`<div style="color:#c0c0d8;font-size:12px;font-style:italic;margin-top:4px">💬 ${v.comment}</div>`:''}</div>`;
    });
  }

  if(sTab==='metro') h+=renderMetro();
  return h;
}

function renderMetro(){
  let dots='';
  for(let i=0;i<metro.bpb;i++){
    const isFirst=i===0;
    const isActive=metro.playing&&metro.beat===i;
    const cls=`beat-dot ${isFirst?'first':'other'}${isActive?(isFirst?' active-first':' active-other'):''}`;
    dots+=`<div class="${cls}"></div>`;
  }
  return `<div class="card" style="text-align:center">
    <div class="card-label">🎵 メトロノーム</div>
    <div class="beats">${dots}</div>
    <div class="bpm-num">${metro.bpm}</div>
    <div class="bpm-lbl">BPM</div>
    <input type="range" min="30" max="240" value="${metro.bpm}" oninput="setBpm(this.value)">
    <div class="chips" style="justify-content:center;margin-bottom:14px">${[40,60,72,80,100,120,144,180].map(v=>`<button class="chip-btn${metro.bpm===v?' active':''}" onclick="setBpm(${v})">${v}</button>`).join('')}</div>
    <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:20px">
      <span class="muted small">拍子</span>
      ${[2,3,4,6].map(v=>`<button class="chip-btn${metro.bpb===v?' active':''}" onclick="setBpb(${v})">${v}拍</button>`).join('')}
    </div>
    <button class="btn${metro.playing?' btn-red':''}" onclick="toggleMetro()">${metro.playing?'⏹ 停止':'▶ スタート'}</button>
  </div>`;
}

function switchMode(m){
  mode=m;tView='list';sView='home';selStudent=null;
  document.querySelectorAll('.tab-bar .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='teacher'?0:1)));
  r();
}
function selectStudent(id){selStudent=DB.students.find(s=>s.id===id);tView='detail';tTab='lesson';lf={date:today(),song:'',scores:initScores(selStudent.instrument),comment:''};r();}
function addStudent(){
  const name=document.getElementById('newName').value.trim();
  if(!name)return;
  DB.students.push({id:uid(),name,instrument:newInst,since:new Date().toISOString().slice(0,7)});
  newName='';save(DB);r();
}
function addLesson(){
  if(!lf.song.trim())return;
  DB.lessons.push({id:uid(),sid:selStudent.id,...lf});
  lf={date:today(),song:'',scores:initScores(selStudent.instrument),comment:''};
  save(DB);r();
}
function addVideo(){
  if(!vf.song.trim())return;
  DB.videos.push({id:uid(),sid:selStudent.id,...vf});
  vf={month:todayMonth(),song:'',scores:{overall:3,technique:3,musicality:3,presence:3},comment:''};
  save(DB);r();
}
function addHomework(){
  if(!hw.task.trim())return;
  DB.homeworks.push({id:uid(),sid:selStudent.id,setDate:today(),...hw,done:false});
  hw={task:'',dueDate:''};save(DB);r();
}
function addPractice(){
  if(!pf.content.trim())return;
  DB.practices.push({id:uid(),sid:selStudent.id,...pf});
  pf={date:today(),minutes:30,content:'',mood:3,note:''};
  save(DB);r();
}
function toggleHw(id){
  const h=DB.homeworks.find(x=>x.id===id);
  if(h){h.done=!h.done;save(DB);r();}
}

// Metronome
function playClick(accent){
  try{
    if(!metro.ctx) metro.ctx=new(window.AudioContext||window.webkitAudioContext)();
    const ctx=metro.ctx;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=accent?1200:800;
    gain.gain.setValueAtTime(accent?0.6:0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.1);
  }catch(e){}
}
function setBpm(v){metro.bpm=parseInt(v);if(metro.playing){clearInterval(metro.interval);startMetroLoop();}r();}
function setBpb(v){metro.bpb=v;metro.beat=0;if(metro.playing){clearInterval(metro.interval);metro.playing=false;}r();}
function startMetroLoop(){
  metro.beat=0;playClick(true);
  metro.interval=setInterval(()=>{
    metro.beat=(metro.beat+1)%metro.bpb;
    playClick(metro.beat===0);
    const dots=document.querySelectorAll('.beat-dot');
    dots.forEach((d,i)=>{
      d.classList.remove('active-first','active-other');
      if(i===metro.beat) d.classList.add(i===0?'active-first':'active-other');
    });
  },(60/metro.bpm)*1000);
}
function toggleMetro(){
  if(metro.playing){clearInterval(metro.interval);metro.playing=false;metro.beat=0;}
  else{metro.playing=true;startMetroLoop();}
  r();
}
