@keyframes spin{to{transform:rotate(360deg);}}

.waveform{display:flex;align-items:center;gap:2px;justify-content:center;margin:8px 0;height:40px;}
.waveform-bar{width:4px;border-radius:2px;background:#6ee7b7;animation:wave 1.2s ease-in-out infinite;}
.waveform-bar:nth-child(2){animation-delay:.1s;height:60%;}
.waveform-bar:nth-child(3){animation-delay:.2s;height:90%;}
.waveform-bar:nth-child(4){animation-delay:.3s;height:70%;}
.waveform-bar:nth-child(5){animation-delay:.4s;height:100%;}
.waveform-bar:nth-child(6){animation-delay:.3s;height:80%;}
.waveform-bar:nth-child(7){animation-delay:.2s;height:60%;}
.waveform-bar:nth-child(8){animation-delay:.1s;height:40%;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1);}}

let mode='teacher',tView='list',sView='home',selStudent=null,sTab='home',tTab='lesson';
let lf={date:today(),song:'',scores:{},comment:''};
let vf={month:todayMonth(),song:'',scores:{overall:3,technique:3,musicality:3,presence:3},comment:''};

let audioTimer={active:false,analyzing:false,showReport:false,reportData:null,seconds:0,soundLevel:0,interval:null,stream:null,audioCtx:null,analyser:null,dataArray:null,prevStamps:0};

function generateReport(seconds,instrument){
  const mins=Math.max(1,Math.floor(seconds/60));
  const rnd=()=>Math.floor(Math.random()*20);
  const reports={
    ピアノ:{scores:{expression:75+rnd(),accuracy:70+rnd(),focus:80+rnd()},advice:'音の粒立ちが前回より改善されています！右手の16分音符のコントロールが向上しました。次回は左手の音量バランスを意識してみましょう。',highlight:'練習開始から約3分後、テンポが安定し始めました。この集中状態が今日のベストパフォーマンスです。',keywords:['#音の粒立ち','#テンポキープ','#右手強化','#次回：左手バランス']},
    バイオリン:{scores:{expression:78+rnd(),accuracy:72+rnd(),focus:82+rnd()},advice:'ボウイングの圧力が安定してきました！音色に温かみが出ています。ポジション移動の際の音の繋がりをさらに意識すると表現が広がります。',highlight:'中盤の練習で音程の精度が約15%向上しました。反復練習の成果が数値に出ています！',keywords:['#ボウイング安定','#音色改善','#ポジション移動','#反復の成果']},
    管楽器:{scores:{expression:76+rnd(),accuracy:74+rnd(),focus:85+rnd()},advice:'ブレスのタイミングが改善されました！フレーズの流れが自然になっています。タンギングのキレをさらに磨くと全体のクオリティが上がります。',highlight:'今日の練習密度は過去最高水準です。同じフレーズを集中して繰り返した効果が音に現れています。',keywords:['#ブレス改善','#フレーズ感','#タンギング強化','#高密度練習']},
    ボーカル:{scores:{expression:82+rnd(),accuracy:76+rnd(),focus:79+rnd()},advice:'声の芯がしっかりしてきました！高音域での安定感が増しています。母音の形を意識することで、さらに響きが豊かになります。',highlight:'練習後半、声のコンディションが上がってきました。ウォームアップの効果が出ています！',keywords:['#声の芯','#高音安定','#母音の形','#響きの改善']},
  };
  const base=reports[instrument]||{scores:{expression:75+rnd(),accuracy:72+rnd(),focus:80+rnd()},advice:'今日も練習お疲れ様です！継続することが最大の上達の秘訣です。この調子で続けていきましょう！',highlight:'練習時間の積み上げが着実に成長につながっています。',keywords:['#継続は力','#着実な成長','#次回も頑張ろう']};
  return {...base,minutes:mins};
}

function today(){return new Date().toISOString().slice(0,10);}
function todayMonth(){return new Date().toISOString().slice(0,7);}
function uid(){return Date.now().toString(36);}
function avg(scores){const v=Object.values(scores).filter(x=>typeof x==='number');return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function getStreak(sid){const dates=[...new Set(DB.practices.filter(p=>p.sid===sid).map(p=>p.date))].sort().reverse();if(!dates.length)return 0;let streak=0,cur=new Date();cur.setHours(0,0,0,0);for(const d of dates){const pd=new Date(d);const diff=Math.round((cur-pd)/86400000);if(diff<=1){streak++;cur=pd;}else break;}return streak;}
function getTotalMin(sid){return DB.practices.filter(p=>p.sid===sid).reduce((a,p)=>a+p.minutes,0);}
function tmpl(inst){return TEMPLATES[inst]||TEMPLATES['その他'];}
function initScores(inst){return tmpl(inst).reduce((a,it)=>({...a,[it.k]:3}),{});}
function getStamps(sid){const total=getTotalMin(sid)+(audioTimer.active&&selStudent&&selStudent.id===sid?Math.floor(audioTimer.seconds/60):0);return Math.floor(total/MINS_PER_STAMP);}

async function startAudioTimer(){
  try{
    audioTimer.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioTimer.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const source=audioTimer.audioCtx.createMediaStreamSource(audioTimer.stream);
    audioTimer.analyser=audioTimer.audioCtx.createAnalyser();
    audioTimer.analyser.fftSize=256;
    source.connect(audioTimer.analyser);
    audioTimer.dataArray=new Uint8Array(audioTimer.analyser.frequencyBinCount);
    audioTimer.active=true;
    audioTimer.prevStamps=getStamps(selStudent.id);
    audioTimer.interval=setInterval(()=>{
      audioTimer.analyser.getByteFrequencyData(audioTimer.dataArray);
      const vol=audioTimer.dataArray.reduce((a,b)=>a+b,0)/audioTimer.dataArray.length;
      audioTimer.soundLevel=Math.min(100,vol*4);
      if(vol>12)audioTimer.seconds++;
      const te=document.getElementById('timer-display');
      if(te){const m=Math.floor(audioTimer.seconds/60),s=audioTimer.seconds%60;te.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
      const se=document.getElementById('sound-fill');
      if(se)se.style.width=audioTimer.soundLevel+'%';
      const de=document.getElementById('detecting-txt');
      if(de)de.textContent=audioTimer.soundLevel>20?'🎵 音を検知中...':'🎤 待機中...';
      const curStamps=getStamps(selStudent.id);
      if(curStamps>audioTimer.prevStamps){audioTimer.prevStamps=curStamps;const ne=document.getElementById('stamp-count');if(ne)ne.textContent=curStamps;showStampToast();}
    },1000);
    r();
  }catch(e){alert('マイクへのアクセスを許可してください');}
}

function stopAudioTimer(){
  clearInterval(audioTimer.interval);
  if(audioTimer.stream)audioTimer.stream.getTracks().forEach(t=>t.stop());
  if(audioTimer.audioCtx)audioTimer.audioCtx.close();
  const secs=audioTimer.seconds;
  const inst=selStudent?selStudent.instrument:'ピアノ';
  if(secs>10&&selStudent){
    const mins=Math.max(1,Math.floor(secs/60));
    DB.practices.push({id:uid(),sid:selStudent.id,date:today(),minutes:mins,content:'🎤 自動計測',mood:3,note:`音検知タイマーで${mins}分記録`});
    save(DB);
  }
  audioTimer.active=false;
  audioTimer.analyzing=true;
  audioTimer.interval=null;
  audioTimer.stream=null;
  audioTimer.audioCtx=null;
  r();
  setTimeout(()=>{
    audioTimer.analyzing=false;
    audioTimer.showReport=true;
    audioTimer.reportData=generateReport(secs,inst);
    r();
  },3000);
}

function closeReport(){
  audioTimer={active:false,analyzing:false,showReport:false,reportData:null,seconds:0,soundLevel:0,interval:null,stream:null,audioCtx:null,analyser:null,dataArray:null,prevStamps:0};
  r();
}

function showStampToast(){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111126;border:2px solid #f4b942;border-radius:16px;padding:20px 32px;text-align:center;z-index:999;';
  t.innerHTML='<div style="font-size:40px">💮</div><div style="color:#f4b942;font-weight:700;margin-top:8px">スタンプ獲得！</div><div style="color:#a0a0c0;font-size:12px;margin-top:4px">10分練習達成🎉</div>';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function r(){
  const app=document.getElementById('app');

function stars(val,cb,sm){let h=`<span class="stars${sm?' stars-sm':''}">`;for(let i=1;i<=5;i++)h+=`<span class="${val>=i?'on':''}" ${cb?`onclick="${cb}(${i})"`:''}">★</span>`;return h+'</span>';}
function radarSVG(scores,items,size){size=size||180;const n=items.length,cx=size/2,cy=size/2,rr=size*0.35;const angle=i=>Math.PI*2*i/n-Math.PI/2;const pt=(i,v)=>({x:cx+rr*(v/5)*Math.cos(angle(i)),y:cy+rr*(v/5)*Math.sin(angle(i))});let h=`<svg width="${size}" height="${size}">`;for(let lv=1;lv<=5;lv++){const pts=items.map((_,i)=>{const p=pt(i,lv);return `${p.x},${p.y}`;}).join(' ');h+=`<polygon points="${pts}" fill="none" stroke="#252538" stroke-width="1"/>`;}items.forEach((_,i)=>{const p=pt(i,5);h+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#252538" stroke-width="1"/>`;});const dpts=items.map((it,i)=>{const p=pt(i,scores[it.k]||0);return `${p.x},${p.y}`;}).join(' ');h+=`<polygon points="${dpts}" fill="#6ee7b7" fill-opacity="0.28" stroke="#6ee7b7" stroke-width="2"/>`;items.forEach((it,i)=>{const lp=pt(i,6.3);h+=`<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" style="font-size:10px;fill:#8888aa">${it.l}</text>`;});return h+'</svg>';}
function lineSVG(data,labels){if(data.length<2)return '<div style="color:#444;font-size:12px;padding:8px 0">レッスンが2回以上になると表示されます</div>';const w=270,h=80,pad=14;const xStep=(w-pad*2)/(data.length-1);const yScale=v=>pad+((5-v)/5)*(h-pad*2);let h2=`<svg width="${w}" height="${h}" style="overflow:visible">`;for(let lv=1;lv<=5;lv++)h2+=`<line x1="${pad}" y1="${yScale(lv)}" x2="${w-pad}" y2="${yScale(lv)}" stroke="#1e1e32" stroke-width="1"/>`;const pts=data.map((v,i)=>`${pad+i*xStep},${yScale(v)}`).join(' ');h2+=`<polyline points="${pts}" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linejoin="round"/>`;data.forEach((v,i)=>h2+=`<circle cx="${pad+i*xStep}" cy="${yScale(v)}" r="4" fill="#6ee7b7"/>`);if(labels)data.forEach((_,i)=>h2+=`<text x="${pad+i*xStep}" y="${h+10}" text-anchor="middle" style="font-size:9px;fill:#555">${labels[i]}</text>`);return h2+'</svg>';}
function calendarHTML(sid){const days=[];const t=new Date();t.setHours(0,0,0,0);for(let i=29;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);days.push(d.toISOString().slice(0,10));}const practiced=new Set(DB.practices.filter(p=>p.sid===sid).map(p=>p.date));return '<div class="calendar">'+days.map(d=>`<div class="cal-day${practiced.has(d)?' done':''}">${practiced.has(d)?'✓':''}</div>`).join('')+'</div>';}

function stampCardHTML(sid){

  if(sTab==='homework'){h+='<div class="card-label">先生からの課題</div>';const allHw=DB.homeworks.filter(h2=>h2.sid===s.id);if(!allHw.length)h+='<div style="color:#555;font-size:13px">課題がまだありません。</div>';allHw.forEach(hw2=>{h+=`<div class="card" style="opacity:${hw2.done?0.45:1}"><div class="hw-row"><div style="flex:1"><div class="${hw2.done?'done-text':''}" style="font-size:14px">${hw2.task}</div>${hw2.dueDate?`<div class="small green" style="margin-top:4px">期限: ${hw2.dueDate}</div>`:''}</div><div style="font-size:22px;margin-left:8px">${hw2.done?'✅':'🎯'}</div></div></div>`;});}
  if(sTab==='video'){if(!myVideos.length)h+='<div style="color:#555;font-size:13px">動画評価がまだありません。</div>';[...myVideos].reverse().forEach(v=>{h+=`<div class="card"><div class="row"><span class="small green">${v.month}</span><span style="font-weight:600">${v.song}</span></div><div style="display:flex;justify-content:center;margin-top:8px">${radarSVG(v.scores,VIDEO_ITEMS,160)}</div>${v.comment?`<div style="color:#c0c0d8;font-size:12px;font-style:italic;margin-top:4px">💬 ${v.comment}</div>`:''}</div>`;});}
  if(sTab==='metro'){let dots='';for(let i=0;i<metro.bpb;i++){const isFirst=i===0;const isActive=metro.playing&&metro.beat===i;dots+=`<div class="beat-dot ${isFirst?'first':'other'}${isActive?(isFirst?' active-first':' active-other'):''}"></div>`;}h+=`<div class="card" style="text-align:center"><div class="card-label">🎵 メトロノーム</div><div class="beats">${dots}</div><div class="bpm-num">${metro.bpm}</div><div class="bpm-lbl">BPM</div><input type="range" min="30" max="240" value="${metro.bpm}" oninput="setBpm(this.value)"><div class="chips" style="justify-content:center;margin-bottom:14px">${[40,60,72,80,100,120,144,180].map(v=>`<button class="chip-btn${metro.bpm===v?' active':''}" onclick="setBpm(${v})">${v}</button>`).join('')}</div><div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:20px"><span class="muted small">拍子</span>${[2,3,4,6].map(v=>`<button class="chip-btn${metro.bpb===v?' active':''}" onclick="setBpb(${v})">${v}拍</button>`).join('')}</div><button class="btn${metro.playing?' btn-red':''}" onclick="toggleMetro()">${metro.playing?'⏹ 停止':'▶ スタート'}</button></div>`;}
  return h;
}

function switchMode(m){mode=m;tView='list';sView='home';selStudent=null;if(audioTimer.active)stopAudioTimer();document.querySelectorAll('.tab-bar .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(m==='teacher'?0:1)));r();}
function selectStudent(id){selStudent=DB.students.find(s=>s.id===id);tView='detail';tTab='lesson';lf={date:today(),song:'',scores:initScores(selStudent.instrument),comment:''};r();}
function addStudent(){const name=document.getElementById('newName').value.trim();if(!name)return;DB.students.push({id:uid(),name,instrument:newInst,since:new Date().toISOString().slice(0,7)});newName='';save(DB);r();}
function addLesson(){if(!lf.song.trim())return;DB.lessons.push({id:uid(),sid:selStudent.id,...lf});lf={date:today(),song:'',scores:initScores(selStudent.instrument),comment:''};save(DB);r();}
function addVideo(){if(!vf.song.trim())return;DB.videos.push({id:uid(),sid:selStudent.id,...vf});vf={month:todayMonth(),song:'',scores:{overall:3,technique:3,musicality:3,presence:3},comment:''};save(DB);r();}
function addHomework(){if(!hw.task.trim())return;DB.homeworks.push({id:uid(),sid:selStudent.id,setDate:today(),...hw,done:false});hw={task:'',dueDate:''};save(DB);r();}
function addPractice(){if(!pf.content.trim())return;DB.practices.push({id:uid(),sid:selStudent.id,...pf});pf={date:today(),minutes:30,content:'',mood:3,note:''};save(DB);r();}
function toggleHw(id){const h=DB.homeworks.find(x=>x.id===id);if(h){h.done=!h.done;save(DB);r();}}
function setLScore_pitch(v){lf.scores.pitch=v;r();}function setLScore_rhythm(v){lf.scores.rhythm=v;r();}function setLScore_sight(v){lf.scores.sight=v;r();}function setLScore_expression(v){lf.scores.expression=v;r();}function setLScore_posture(v){lf.scores.posture=v;r();}function setLScore_bowing(v){lf.scores.bowing=v;r();}function setLScore_tone(v){lf.scores.tone=v;r();}function setLScore_tonguing(v){lf.scores.tonguing=v;r();}function setLScore_breath(v){lf.scores.breath=v;r();}function setLScore_voice(v){lf.scores.voice=v;r();}function setLScore_diction(v){lf.scores.diction=v;r();}function setLScore_attitude(v){lf.scores.attitude=v;r();}
function setVScore_overall(v){vf.scores.overall=v;r();}function setVScore_technique(v){vf.scores.technique=v;r();}function setVScore_musicality(v){vf.scores.musicality=v;r();}function setVScore_presence(v){vf.scores.presence=v;r();}
function playClick(accent){try{if(!metro.ctx)metro.ctx=new(window.AudioContext||window.webkitAudioContext)();const ctx=metro.ctx;const osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=accent?1200:800;gain.gain.setValueAtTime(accent?0.6:0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.1);}catch(e){}}
function setBpm(v){metro.bpm=parseInt(v);if(metro.playing){clearInterval(metro.interval);startMetroLoop();}r();}
function setBpb(v){metro.bpb=v;metro.beat=0;if(metro.playing){clearInterval(metro.interval);metro.playing=false;}r();}
function startMetroLoop(){metro.beat=0;playClick(true);metro.interval=setInterval(()=>{metro.beat=(metro.beat+1)%metro.bpb;playClick(metro.beat===0);const dots=document.querySelectorAll('.beat-dot');dots.forEach((d,i)=>{d.classList.remove('active-first','active-other');if(i===metro.beat)d.classList.add(i===0?'active-first':'active-other');});},(60/metro.bpm)*1000);}
function toggleMetro(){if(metro.playing){clearInterval(metro.interval);metro.playing=false;metro.beat=0;}else{metro.playing=true;startMetroLoop();}r();}
r();
</script>
</body>
