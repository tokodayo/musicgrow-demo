function avg(scores) {
  const v = Object.values(scores).filter(x=>typeof x==="number");
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0;
}
function getStreak(practices, studentId) {
  const dates=[...new Set(practices.filter(p=>p.studentId===studentId).map(p=>p.date))].sort().reverse();
  if(!dates.length) return 0;
  let streak=0, cur=new Date(); cur.setHours(0,0,0,0);
  for(const d of dates){const pd=new Date(d);const diff=Math.round((cur-pd)/86400000);if(diff<=1){streak++;cur=pd;}else break;}
  return streak;
}
function getTotalMinutes(practices, studentId) {
  return practices.filter(p=>p.studentId===studentId).reduce((a,p)=>a+p.minutes,0);
}

function StarRating({value,onChange,size=22}){
  return (
    <div style={{display:"flex",gap:3}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>onChange&&onChange(s)}
          style={{fontSize:size,cursor:onChange?"pointer":"default",color:s<=value?"#f4b942":"#2e2e42",transition:"color .12s",userSelect:"none"}}>★</span>
      ))}
    </div>
  );
}

function RadarChart({scores,items,size=180}){
  const n=items.length,cx=size/2,cy=size/2,r=size*0.35;
  const angle=i=>Math.PI*2*i/n-Math.PI/2;
  const pt=(i,v)=>({x:cx+r*(v/5)*Math.cos(angle(i)),y:cy+r*(v/5)*Math.sin(angle(i))});
  const grid=lv=>items.map((_,i)=>{const p=pt(i,lv);return `${p.x},${p.y}`;}).join(" ");
  const data=items.map((it,i)=>{const p=pt(i,scores[it.key]||0);return `${p.x},${p.y}`;}).join(" ");
  return (
    <svg width={size} height={size}>
      {[1,2,3,4,5].map(lv=><polygon key={lv} points={grid(lv)} fill="none" stroke="#252538" strokeWidth="1"/>)}
      {items.map((_,i)=>{const p=pt(i,5);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#252538" strokeWidth="1"/>;} )}
      <polygon points={data} fill="#6ee7b7" fillOpacity="0.28" stroke="#6ee7b7" strokeWidth="2"/>
      {items.map((it,i)=>{const lp=pt(i,6.3);return <text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle" style={{fontSize:10,fill:"#8888aa"}}>{it.label}</text>;})}
    </svg>
  );
}

function LineChart({data,labels}){
  if(data.length<2) return <div style={{color:"#444",fontSize:12,padding:"8px 0"}}>レッスンが2回以上になると表示されます</div>;
  const w=270,h=80,pad=14;
  const xStep=(w-pad*2)/(data.length-1);
  const yScale=v=>pad+((5-v)/5)*(h-pad*2);
  const pts=data.map((v,i)=>`${pad+i*xStep},${yScale(v)}`).join(" ");
  return (
    <svg width={w} height={h} style={{overflow:"visible"}}>
      {[1,2,3,4,5].map(lv=><line key={lv} x1={pad} y1={yScale(lv)} x2={w-pad} y2={yScale(lv)} stroke="#1e1e32" strokeWidth="1"/>)}
      <polyline points={pts} fill="none" stroke="#6ee7b7" strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((v,i)=><circle key={i} cx={pad+i*xStep} cy={yScale(v)} r="4" fill="#6ee7b7"/>)}
      {labels&&data.map((_,i)=><text key={i} x={pad+i*xStep} y={h+10} textAnchor="middle" style={{fontSize:9,fill:"#555"}}>{labels[i]}</text>)}
    </svg>
  );
}
